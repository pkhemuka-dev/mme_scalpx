      - DHAN
    preferred_provider: DHAN
    backup_provider: null
    require_flat_for_switch: true
    allow_mid_position_switch: false
    preposition_switch_requires_setup_rebuild: true

  execution_primary:
    allowed_providers:
      - ZERODHA
      - DHAN
